server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static chunks from CRA get a hash in the filename — safe to cache forever
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fonts — immutable filenames
    location /assets/fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Do not cache index.html — it references hashed assets that change per deploy
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss text/javascript image/svg+xml;
}
