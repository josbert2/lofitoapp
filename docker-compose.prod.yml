services:
  mysql:
    image: mysql:8.0
    container_name: lofito-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: lofitoapp
      MYSQL_USER: lofiuser
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - default

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: lofito-api
    restart: unless-stopped
    environment:
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: lofiuser
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: lofitoapp
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - default
      - proxy

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        REACT_APP_API_URL: ""
    container_name: lofito-web
    restart: unless-stopped
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - default
      - proxy

volumes:
  mysql_data:

networks:
  default:
    name: lofito_default
  proxy:
    name: api-jos_default
    external: true
