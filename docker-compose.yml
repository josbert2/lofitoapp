services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: lofitoapp
      MYSQL_USER: lofiuser
      MYSQL_PASSWORD: lofipass123
    ports:
      - "3318:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 20
  adminer:
    image: adminer
    ports:
      - "8099:8080"
    depends_on:
      - db
volumes:
  mysql_data:
