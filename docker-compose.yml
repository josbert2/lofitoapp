version: "3.8"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    ports:
      - "7432:5432"
    volumes:
      - db:/var/lib/postgresql/data
  adminer:
    image: adminer
    ports:
      - "7680:8080"
volumes:
  db: